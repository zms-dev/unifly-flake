name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  NIXPKGS_ALLOW_UNFREE: "1"

jobs:
  check:
    name: Lint & Verify
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.head_ref != 'dev'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: unifly-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Check Flake schema & outputs
        run: nix flake check

      - name: Verify Formatting
        run: |
          nix fmt
          git diff --exit-code

      - name: Auto-commit updated documentation
        if: github.ref != 'refs/heads/main'
        run: |
          nix run .#generate-docs
          if ! git diff --quiet docs/; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/configuration.md
            git commit -m "chore: auto-generate settings documentation"
            git push
          fi

  build:
    name: Build Package
    runs-on: ${{ matrix.os }}
    needs: check
    if: github.event_name != 'pull_request' || github.head_ref != 'dev'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: unifly-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build Unifly
        run: nix build .#unifly --no-link

  promote:
    name: Maintain Release PR
    runs-on: ubuntu-latest
    needs: [check, build]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Check differences and manage PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          if git diff --quiet origin/main..origin/dev; then
            echo "No new changes in dev compared to main. Nothing to promote."
            exit 0
          fi
          echo "Changes detected in dev that are not in main. Managing release PR..."
          pr_exists=$(gh pr list --state open --base main --head dev --json number --jq '.[0].number')
          if [ -z "$pr_exists" ]; then
            gh pr create \
              --base main \
              --head dev \
              --title "Release: dev to main" \
              --body "This is an automated PR to promote the latest changes from the \`dev\` branch to \`main\` (production). Review changes, ensure all CI checks have passed on \`dev\`, and merge this PR to deploy."
            echo "Created a new release PR."
          else
            echo "A release PR already exists: #$pr_exists. It is automatically updated with the latest dev commits."
          fi
