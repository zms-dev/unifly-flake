name: Update

on:
  schedule:
    # Run weekly on Sundays at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual triggering

jobs:
  update:
    name: Update Packages & Flake Lock
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: unifly-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Run package update script
        run: nix run .#update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: dev
          branch: automated/weekly-update
          commit-message: "chore: weekly updates"
          title: "chore: weekly updates"
          body: |
            Automated weekly updates generated by GitHub Actions.
            
            This PR includes updates for:
            - Unifly binary version and hashes (`pkgs/unifly.nix`)
            - Flake lock file inputs (`flake.lock`)
            - Auto-generated settings documentation (`docs/configuration.md`)
            
            CI checks will run automatically on this PR targeting the `dev` branch.
          labels: |
            updates
            automated-pr
          delete-branch: true
